<?xml version="1.0" encoding="UTF-8"?>
<!-- FileAI — icona minimale: cartella + scintilla AI (palette Tokyo Night) -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dcfff"/>
      <stop offset="1" stop-color="#7aa2f7"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- sfondo arrotondato scuro -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="#1a1b26"/>

  <!-- linguetta della cartella -->
  <path d="M232 300
           h236
           l64 84
           h-300
           a8 8 0 0 1 -8 -8
           v-68
           a8 8 0 0 1 8 -8 z"
        fill="#7aa2f7"/>

  <!-- corpo della cartella -->
  <rect x="208" y="372" width="608" height="392" rx="44" ry="44" fill="url(#folder)"/>

  <!-- scintilla AI grande (stella a 4 punte) -->
  <path d="M620 396
           C 632 470 660 498 734 510
           C 660 522 632 550 620 624
           C 608 550 580 522 506 510
           C 580 498 608 470 620 396 Z"
        fill="url(#spark)"/>

  <!-- scintilla AI piccola -->
  <path d="M732 600
           C 738 632 752 646 784 652
           C 752 658 738 672 732 704
           C 726 672 712 658 680 652
           C 712 646 726 632 732 600 Z"
        fill="#ffffff" opacity="0.95"/>
</svg>
